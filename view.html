<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="SYRTN-logo-homepage.png" type="image/png">
    <link rel="apple-touch-icon" href="SYRTN-logo-homepage.png">
    <title>SYRTN | View</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/view.css">
</head>
<body>
<div class="auth-bar">
    <a href="index.html" class="logo-link"><img src="SYRTN-logo-homepage.png" alt="Logo" class="nav-logo"><span>SYRTN</span></a>
    <div class="auth-user-zone"><span id="userNameDisplay" class="hidden" style="font-size:.9rem; color:#ccc;"></span><a href="login.html" id="loginBtn" class="auth-btn">LOGIN</a><button id="logoutBtn" class="auth-btn hidden">LOGOUT</button></div>
</div>
<div class="container">
    <div class="view-card">
        <div class="admin-zone"><button class="btn-small hidden" id="btnEditPost">수정</button><button class="btn-small hidden" id="btnDeletePost" style="color:#ff4d4d; border-color:#ff4d4d;">삭제</button></div>
        <div class="post-header"><div id="viewCategory" class="post-category">RESOURCE</div><h1 id="viewTitle" class="post-title">불러오는 중...</h1><div class="post-info"><span id="viewAuthor">-</span><span id="viewDate">-</span></div></div>
        <div id="viewContent" class="post-content"></div>
        <div class="links-container" id="linksContainer"></div>
        <div class="comment-section">
            <div class="comment-title">COMMENTS</div>
            <div id="commentList"></div>
            <div id="commentFormArea" class="hidden"><div class="comment-form"><input type="text" id="commentInput" class="comment-input" placeholder="의견을 남겨주세요"><button class="btn-comment" id="btnPostComment">POST</button></div></div>
            <div id="loginNotice" class="hidden" style="text-align:center; color:#888; margin-top:20px;">댓글 작성을 위해 <a href="login.html" style="color:var(--accent)">로그인</a>이 필요합니다.</div>
        </div>
        <a href="resource.html" style="display:block; margin-top:40px; color:#555; text-decoration:none;">← BACK TO LIST</a>
    </div>
</div>
<footer>
  <p>&copy; 2026 SYRTN Collaboration. All Rights Reserved.</p>
  <p>영광 해룡고 | 순천고 | 순천 복성고 물리·지구과학 동아리</p>
  <p>designed by SYRTN Team | Contact: 2jw5464@gmail.com</p>
</footer>
<script type="module" src="js/view.js"></script>
<script type="module" src="frontend-access-control.js"></script>
</body>
</html>
