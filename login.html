<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRTN | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --accent: #00E5FF;
            --text-main: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* 상단 Bar */
        .auth-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .nav-logo {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            background-color: white;
            object-fit: contain;
        }

        /* 로그인 컨테이너 */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            background: radial-gradient(circle at center, #102027 0%, #050505 100%);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .login-card h2 { margin-bottom: 30px; font-weight: 700; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; margin-bottom: 8px; color: #aaa; }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: var(--input-bg);
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        .input-group input:focus { border-color: var(--accent); }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .btn-primary { background-color: var(--accent); color: #000; }
        .btn-google {
            background-color: white; color: #000;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .login-footer { margin-top: 20px; font-size: 0.85rem; color: #888; }
        .login-footer a { color: var(--accent); text-decoration: none; margin: 0 5px; cursor: pointer; }
        .login-footer a:hover { text-decoration: underline; }

        .divider { margin: 25px 0; display: flex; align-items: center; color: #555; font-size: 0.8rem; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #333; margin: 0 10px; }

        footer {
            background: #000;
            padding: 40px 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 600px) {
            .logo-area span { font-size: 16px; }
            nav a { padding: 10px 12px; font-size: 13px; }
            header h1 { font-size: 22px; }
            .header-logo { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

<div class="auth-bar">
    <a href="index.html" class="logo-link">
        <img src="SYRTN-logo-homepage.png" alt="SYRTN Logo" class="nav-logo">
        <span>SYRTN</span>
    </a>
</div>

<main class="login-wrapper">
    <div class="login-card">
        <h2>Sign In</h2>
        
        <form id="login-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary">로그인</button>
        </form>
        <div class="divider">또는</div>
        <button id="google-btn" class="btn btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" height="18">
            Google로 계속하기
        </button>

        <div class="login-footer">
            <a id="find-pw">비밀번호 찾기</a> | 
            <a href="signup.html">회원 가입</a>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 SYRTN Collaboration. All Rights Reserved.</p>
    <p>영광해룡고등학교 | 순천고등학교 | 순천복성고등학교 물리·천문·지구과학 동아리 연합</p>
    <p>designed by SYRTN Team | 문의 : 2jw5464@gmail.com</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    // [추가] App Check 라이브러리 임포트
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";
    import { 
        getAuth, 
        signInWithEmailAndPassword, 
        signInWithPopup, 
        GoogleAuthProvider, 
        sendPasswordResetEmail,
        signOut 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyB-0z16OPjp1wY0-U_EHKY9kbRCVba4DkU",
        authDomain: "syrt-2026.firebaseapp.com",
        projectId: "syrt-2026",
        storageBucket: "syrt-2026.firebasestorage.app",
        messagingSenderId: "848896876364",
        appId: "1:848896876364:web:42edc690489962f76df9e9",
        measurementId: "G-Q0BKR95VH2"
    };

    // 초기화
    const app = initializeApp(firebaseConfig);

    // --- [App Check 초기화] ---
    const appCheck = initializeAppCheck(app, {
        provider: new ReCaptchaV3Provider('6Lfnw9ksAAAAAAoBVTPO6fqtCUMeteYlsk5OYjnq'),
        isTokenAutoRefreshEnabled: true 
    });

    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // --- [1] 이메일 로그인 로직 (인증 필수 체크) ---
    const loginForm = document.getElementById('login-form');
    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = loginForm.querySelector('button');

        submitBtn.disabled = true;
        submitBtn.innerText = "로그인 중...";

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 메일 인증 여부 확인
            if (user.emailVerified) {
                // 인증됨 -> 메인 페이지로
                location.href = 'index.html';
            } else {
                // 인증 안 됨 -> 경고 후 로그아웃
                alert("이메일 인증이 완료되지 않았습니다.\n가입 시 발송된 메일의 인증 링크를 클릭해 주세요.");
                await signOut(auth); 
                submitBtn.disabled = false;
                submitBtn.innerText = "로그인";
            }
        } catch (error) {
            console.error("로그인 에러:", error);
            alert("로그인에 실패했습니다. 이메일 또는 비밀번호를 확인하세요.");
            submitBtn.disabled = false;
            submitBtn.innerText = "로그인";
        }
    };

    // --- [2] Google 로그인 로직 ---
    const googleBtn = document.getElementById('google-btn');
    googleBtn.onclick = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;

            // Firestore에서 유저 정보 확인
            const userDocRef = doc(db, "users", user.uid);
            const userDoc = await getDoc(userDocRef);

            if (userDoc.exists()) {
                location.href = 'index.html';
            } else {
                alert("추가 정보 등록이 필요합니다. 가입 페이지로 이동합니다.");
                const name = encodeURIComponent(user.displayName || "");
                const email = encodeURIComponent(user.email || "");
                location.href = `signup.html?name=${name}&email=${email}&method=google`;
            }
        } catch (error) {
            console.error("구글 로그인 에러:", error);
            alert("Google 로그인 중 오류가 발생했습니다.");
        }
    };

    // --- [3] 비밀번호 재설정 ---
    document.getElementById('find-pw').onclick = async () => {
        const email = prompt("비밀번호 재설정 링크를 받을 이메일을 입력하세요:");
        if (email) {
            try {
                await sendPasswordResetEmail(auth, email);
                alert("입력하신 이메일로 비밀번호 재설정 링크를 보냈습니다.");
            } catch (error) {
                alert("존재하지 않는 이메일이거나 오류가 발생했습니다.");
            }
        }
    };
</script>
</body>
</html>
