<style>
:root{--bg-dark:#050505;--accent:#00E5FF;--text-main:#fff;--card-bg:rgba(255,255,255,.05);--nav-bg:rgba(0,0,0,.9);--border-color:rgba(255,255,255,.12)}*{box-sizing:border-box}body,html{margin:0;padding:0;font-family:Arial,sans-serif;background:var(--bg-dark);color:var(--text-main);line-height:1.6}.auth-bar{position:fixed;top:0;width:100%;height:60px;background:var(--nav-bg);display:flex;justify-content:space-between;align-items:center;padding:0 clamp(16px,4vw,40px);z-index:1000;border-bottom:1px solid var(--border-color)}.logo-link{display:flex;align-items:center;gap:12px;text-decoration:none;color:white;font-weight:700;letter-spacing:1.2px}.nav-logo{width:40px;height:40px;border-radius:50%;background:white;object-fit:contain}.auth-user-zone{display:flex;align-items:center;gap:10px}.auth-btn,.btn{background:transparent;border:1px solid var(--text-main);color:var(--text-main);min-height:32px;padding:6px 14px;border-radius:4px;text-decoration:none;cursor:pointer;font-size:.85rem}.btn-primary{border-color:var(--accent);color:var(--accent)}.btn-primary:hover{background:var(--accent);color:#000}.sub-nav-container{width:100%;height:52px;background:#111;position:sticky;top:60px;z-index:900;overflow-x:auto;border-bottom:1px solid var(--border-color)}.nav-menu{min-height:52px;width:max-content;min-width:100%;display:flex;justify-content:center;align-items:center;padding:0 16px}.nav-menu a{height:52px;display:inline-flex;align-items:center;padding:0 14px;color:rgba(255,255,255,.72);text-decoration:none;font-size:.9rem;letter-spacing:.8px;white-space:nowrap}.nav-menu a:hover{color:var(--accent)}.hero{min-height:300px;height:42vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 18px 28px;background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.92)),url('https://images.unsplash.com/photo-1462332420958-a05d1e002413?q=80&w=1920') center/cover}.hero h1{font-size:clamp(2.2rem,7vw,4rem);color:var(--accent);margin:0 0 10px}.container{width:100%;max-width:900px;margin:56px auto 100px;padding:0 20px}.panel{background:var(--card-bg);border:1px solid var(--border-color);border-radius:8px;padding:28px}.section-title{font-size:1.5rem;border-left:4px solid var(--accent);padding-left:14px;margin:0 0 22px}label{display:block;margin:16px 0 7px;color:#ccc}input,select,textarea{width:100%;background:rgba(0,0,0,.35);border:1px solid var(--border-color);color:#fff;border-radius:6px;padding:11px 12px;font-family:inherit;font-size:1rem}textarea{min-height:140px;resize:vertical}.actions{display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;margin-top:22px}.social-divider{display:flex;align-items:center;gap:12px;margin:24px 0 14px;color:rgba(255,255,255,.42);font-size:.78rem;text-transform:uppercase}.social-divider::before,.social-divider::after{content:"";height:1px;flex:1;background:var(--border-color)}.login-alt-actions{flex-direction:column;align-items:stretch;margin-top:0}.google-btn{width:100%;min-height:46px;background:#fff;border:1px solid #dadce0;color:#202124;font-size:.94rem;font-weight:700;justify-content:center}.google-btn::before{content:"G";display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;margin-right:10px;color:#4285f4;font-size:1.05rem;font-weight:800}.google-btn:hover,.google-btn:focus-visible{background:#f8fafd;border-color:#9aa0a6;color:#202124;outline:none}.signup-link{width:100%;border-color:transparent;color:rgba(255,255,255,.72);text-align:center}.signup-link:hover,.signup-link:focus-visible{border-color:var(--border-color);color:var(--accent);outline:none}.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}.info-card{border:1px solid var(--border-color);border-radius:8px;padding:22px;background:rgba(255,255,255,.035);color:white;text-align:left}.info-card h3{color:var(--accent);margin:0 0 8px}footer{text-align:center;padding:50px 20px;color:#555;font-size:.8rem;border-top:1px solid var(--border-color)}@media(max-width:700px){.auth-bar{height:56px;padding:0 14px}.nav-logo{width:34px;height:34px}.sub-nav-container{top:56px;height:48px}.nav-menu{justify-content:flex-start;min-height:48px;padding:0 10px}.nav-menu a{height:48px;padding:0 11px;font-size:.78rem}.container{padding:0 16px;margin-top:36px}.panel{padding:20px}.hero{min-height:260px;height:38vh;padding-top:72px}}

<main class="container" style="margin-top:120px"><section class="panel"><h1 class="section-title">Login</h1><form id="login-form"><label>Email</label><input id="email" type="email" required><label>Password</label><input id="password" type="password" required><div class="actions"><button type="button" class="btn" id="reset-btn">Reset password</button><button class="btn btn-primary" id="login-btn" type="submit">Login</button></div></form><div class="social-divider"><span>or</span></div><div class="actions login-alt-actions"><button class="btn google-btn" id="google-btn">Continue with Google</button><a class="btn signup-link" href="signup.html">Sign up</a></div></section></main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyB-0z16OPjp1wY0-U_EHKY9kbRCVba4DkU",authDomain:"syrt-2026.firebaseapp.com",projectId:"syrt-2026",storageBucket:"syrt-2026.firebasestorage.app",messagingSenderId:"848896876364",appId:"1:848896876364:web:42edc690489962f76df9e9"};const app=initializeApp(firebaseConfig);initializeAppCheck(app,{provider:new ReCaptchaV3Provider("6Lfnw9ksAAAAAAoBVTPO6fqtCUMeteYlsk5OYjnq"),isTokenAutoRefreshEnabled:true});const auth=getAuth(app);const db=getFirestore(app);document.getElementById("login-form").addEventListener("submit",async e=>{e.preventDefault();const btn=document.getElementById("login-btn");btn.disabled=true;btn.textContent="Signing in...";try{const cred=await signInWithEmailAndPassword(auth,document.getElementById("email").value.trim(),document.getElementById("password").value);if(!cred.user.emailVerified){alert("Email verification is required.");await signOut(auth);return;}location.href="index.html";}catch(err){alert("Login failed. Check your email and password.");}finally{btn.disabled=false;btn.textContent="Login";}});document.getElementById("google-btn").onclick=async()=>{try{const cred=await signInWithPopup(auth,new GoogleAuthProvider());const snap=await getDoc(doc(db,"users",cred.user.uid));location.href=snap.exists()?"index.html":"signup.html";}catch(err){alert("Google login failed.");}};document.getElementById("reset-btn").onclick=async()=>{const email=prompt("Enter your email address.");if(!email)return;try{await sendPasswordResetEmail(auth,email);alert("Password reset email sent.");}catch(err){alert("Failed to send reset email.");}};
</script>
