<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="SYRTN-logo-homepage.png" type="image/png">
    <link rel="apple-touch-icon" href="SYRTN-logo-homepage.png">
    <title>SYRTN | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --accent: #00E5FF;
            --text-main: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* ?곷떒 Bar */
        .auth-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .nav-logo {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            background-color: white;
            object-fit: contain;
        }

        /* 濡쒓렇??而⑦뀒?대꼫 */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            background: radial-gradient(circle at center, #102027 0%, #050505 100%);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .login-card h2 { margin-bottom: 30px; font-weight: 700; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; margin-bottom: 8px; color: #aaa; }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: var(--input-bg);
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        .input-group input:focus { border-color: var(--accent); }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .btn-primary { background-color: var(--accent); color: #000; }
        .btn-google {
            background-color: white; color: #000;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .login-footer { margin-top: 20px; font-size: 0.85rem; color: #888; }
        .login-footer a { color: var(--accent); text-decoration: none; margin: 0 5px; cursor: pointer; }
        .login-footer a:hover { text-decoration: underline; }

        .divider { margin: 25px 0; display: flex; align-items: center; color: #555; font-size: 0.8rem; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #333; margin: 0 10px; }

        footer {
            background: #000;
            padding: 40px 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 600px) {
            .logo-area span { font-size: 16px; }
            nav a { padding: 10px 12px; font-size: 13px; }
            header h1 { font-size: 22px; }
            .header-logo { width: 100px; height: 100px; }
        }
    
        /* Unified responsive navigation */
        .auth-bar {
            height: 60px !important;
            padding: 0 clamp(16px, 4vw, 40px) !important;
            gap: 16px !important;
        }
        .logo-link {
            min-width: 0 !important;
            flex: 0 1 auto !important;
            letter-spacing: 1.2px !important;
            white-space: nowrap !important;
        }
        .nav-logo {
            width: 40px !important;
            height: 40px !important;
            flex: 0 0 40px !important;
        }
        .auth-user-zone {
            min-width: 0 !important;
            flex: 0 1 auto !important;
            justify-content: flex-end !important;
            gap: 10px !important;
        }
        .auth-btn {
            min-height: 32px !important;
            padding: 6px 14px !important;
            box-sizing: border-box !important;
            white-space: nowrap !important;
            line-height: 1.2 !important;
        }
        .sub-nav-container {
            height: 52px !important;
            top: 60px !important;
            overflow-x: auto !important;
            overflow-y: hidden !important;
            -webkit-overflow-scrolling: touch !important;
            scrollbar-width: thin !important;
        }
        .nav-menu {
            min-height: 52px !important;
            width: max-content !important;
            min-width: 100% !important;
            display: flex !important;
            flex-wrap: nowrap !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 0 !important;
            padding: 0 16px !important;
            box-sizing: border-box !important;
        }
        .nav-menu a {
            height: 52px !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 0 14px !important;
            box-sizing: border-box !important;
            font-size: 0.9rem !important;
            line-height: 1.1 !important;
            letter-spacing: 0.8px !important;
            white-space: nowrap !important;
            flex: 0 0 auto !important;
        }
        .nav-menu a.active::after {
            bottom: 8px !important;
        }
        @media (max-width: 700px) {
            .auth-bar {
                height: 56px !important;
                padding: 0 14px !important;
            }
            .logo-link span {
                font-size: 0.95rem !important;
            }
            .nav-logo {
                width: 34px !important;
                height: 34px !important;
                flex-basis: 34px !important;
            }
            .auth-user-zone {
                gap: 8px !important;
            }
            .auth-user-zone span[id*="user"], #user-name, #userNameDisplay {
                max-width: 34vw !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
                white-space: nowrap !important;
            }
            .auth-btn {
                min-height: 30px !important;
                padding: 5px 10px !important;
                font-size: 0.78rem !important;
            }
            .sub-nav-container {
                top: 56px !important;
                height: 48px !important;
            }
            .nav-menu {
                min-height: 48px !important;
                justify-content: flex-start !important;
                padding: 0 10px !important;
            }
            .nav-menu a {
                height: 48px !important;
                padding: 0 11px !important;
                font-size: 0.78rem !important;
                letter-spacing: 0.4px !important;
            }
            header.intro-hero,
            header.board-hero {
                min-height: 260px !important;
                height: 38vh !important;
                padding-top: 56px !important;
            }
            .intro-hero h1,
            .board-hero h1,
            header h1 {
                font-size: clamp(2rem, 10vw, 2.6rem) !important;
                line-height: 1.12 !important;
                padding: 0 16px !important;
                box-sizing: border-box !important;
            }
            .intro-hero p,
            .board-hero p {
                font-size: 0.95rem !important;
                padding: 0 18px !important;
                box-sizing: border-box !important;
            }
            .content-section,
            .container {
                width: 100% !important;
                max-width: 100% !important;
                padding-left: 16px !important;
                padding-right: 16px !important;
                box-sizing: border-box !important;
            }
        }
    </style>
</head>
<body>

<div class="auth-bar">
    <a href="index.html" class="logo-link">
        <img src="SYRTN-logo-homepage.png" alt="SYRTN Logo" class="nav-logo">
        <span>SYRTN</span>
    </a>
</div>

<main class="login-wrapper">
    <div class="login-card">
        <h2>Sign In</h2>
        
        <form id="login-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="?™™™™™™™? required>
            </div>
            <button type="submit" class="btn btn-primary">濡쒓렇??/button>
        </form>
        <div class="divider">?먮뒗</div>
        <button id="google-btn" class="btn btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G" height="18">
            Google濡?怨꾩냽?섍린
        </button>

        <div class="login-footer">
            <a id="find-pw">鍮꾨?踰덊샇 李얘린</a> | 
            <a href="signup.html">?뚯썝 媛??/a>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 SYRTN Collaboration. All Rights Reserved.</p>
    <p>?곴킅?대！怨좊벑?숆탳 | ?쒖쿇怨좊벑?숆탳 | ?쒖쿇蹂듭꽦怨좊벑?숆탳 臾쇰━쨌泥쒕Ц쨌吏援ш낵???숈븘由??고빀</p>
    <p>designed by SYRTN Team | 臾몄쓽 : 2jw5464@gmail.com</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    // [異붽?] App Check ?쇱씠釉뚮윭由??꾪룷??
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";
    import { 
        getAuth, 
        signInWithEmailAndPassword, 
        signInWithPopup, 
        GoogleAuthProvider, 
        sendPasswordResetEmail,
        signOut 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase ?ㅼ젙
    const firebaseConfig = {
        apiKey: "AIzaSyB-0z16OPjp1wY0-U_EHKY9kbRCVba4DkU",
        authDomain: "syrt-2026.firebaseapp.com",
        projectId: "syrt-2026",
        storageBucket: "syrt-2026.firebasestorage.app",
        messagingSenderId: "848896876364",
        appId: "1:848896876364:web:42edc690489962f76df9e9",
        measurementId: "G-Q0BKR95VH2"
    };

    // 珥덇린??
    const app = initializeApp(firebaseConfig);

    // --- [App Check 珥덇린?? ---
    const appCheck = initializeAppCheck(app, {
        provider: new ReCaptchaV3Provider('6Lfnw9ksAAAAAAoBVTPO6fqtCUMeteYlsk5OYjnq'),
        isTokenAutoRefreshEnabled: true 
    });

    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // --- [1] ?대찓??濡쒓렇??濡쒖쭅 (?몄쬆 ?꾩닔 泥댄겕) ---
    const loginForm = document.getElementById('login-form');
    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = loginForm.querySelector('button');

        submitBtn.disabled = true;
        submitBtn.innerText = "濡쒓렇??以?..";

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 硫붿씪 ?몄쬆 ?щ? ?뺤씤
            if (user.emailVerified) {
                // ?몄쬆??-> 硫붿씤 ?섏씠吏濡?
                location.href = 'index.html';
            } else {
                // ?몄쬆 ????-> 寃쎄퀬 ??濡쒓렇?꾩썐
                alert("?대찓???몄쬆???꾨즺?섏? ?딆븯?듬땲??\n媛????諛쒖넚??硫붿씪???몄쬆 留곹겕瑜??대┃??二쇱꽭??");
                await signOut(auth); 
                submitBtn.disabled = false;
                submitBtn.innerText = "濡쒓렇??;
            }
        } catch (error) {
            console.error("濡쒓렇???먮윭:", error);
            alert("濡쒓렇?몄뿉 ?ㅽ뙣?덉뒿?덈떎. ?대찓???먮뒗 鍮꾨?踰덊샇瑜??뺤씤?섏꽭??");
            submitBtn.disabled = false;
            submitBtn.innerText = "濡쒓렇??;
        }
    };

    // --- [2] Google 濡쒓렇??濡쒖쭅 ---
    const googleBtn = document.getElementById('google-btn');
    googleBtn.onclick = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;

            // Firestore?먯꽌 ?좎? ?뺣낫 ?뺤씤
            const userDocRef = doc(db, "users", user.uid);
            const userDoc = await getDoc(userDocRef);

            if (userDoc.exists()) {
                location.href = 'index.html';
            } else {
                alert("異붽? ?뺣낫 ?깅줉???꾩슂?⑸땲?? 媛???섏씠吏濡??대룞?⑸땲??");
                const name = encodeURIComponent(user.displayName || "");
                const email = encodeURIComponent(user.email || "");
                location.href = `signup.html?name=${name}&email=${email}&method=google`;
            }
        } catch (error) {
            console.error("援ш? 濡쒓렇???먮윭:", error);
            alert("Google 濡쒓렇??以??ㅻ쪟媛 諛쒖깮?덉뒿?덈떎.");
        }
    };

    // --- [3] 鍮꾨?踰덊샇 ?ъ꽕??---
    document.getElementById('find-pw').onclick = async () => {
        const email = prompt("鍮꾨?踰덊샇 ?ъ꽕??留곹겕瑜?諛쏆쓣 ?대찓?쇱쓣 ?낅젰?섏꽭??");
        if (email) {
            try {
                await sendPasswordResetEmail(auth, email);
                alert("?낅젰?섏떊 ?대찓?쇰줈 鍮꾨?踰덊샇 ?ъ꽕??留곹겕瑜?蹂대깉?듬땲??");
            } catch (error) {
                alert("議댁옱?섏? ?딅뒗 ?대찓?쇱씠嫄곕굹 ?ㅻ쪟媛 諛쒖깮?덉뒿?덈떎.");
            }
        }
    };
</script>
</body>
</html>
