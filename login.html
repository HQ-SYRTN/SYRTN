<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyB-0z16OPjp1wY0-U_EHKY9kbRCVba4DkU",authDomain:"syrt-2026.firebaseapp.com",projectId:"syrt-2026",storageBucket:"syrt-2026.firebasestorage.app",messagingSenderId:"848896876364",appId:"1:848896876364:web:42edc690489962f76df9e9"};const app=initializeApp(firebaseConfig);initializeAppCheck(app,{provider:new ReCaptchaV3Provider("6Lfnw9ksAAAAAAoBVTPO6fqtCUMeteYlsk5OYjnq"),isTokenAutoRefreshEnabled:true});const auth=getAuth(app);const db=getFirestore(app);document.getElementById("login-form").addEventListener("submit",async e=>{e.preventDefault();const btn=document.getElementById("login-btn");btn.disabled=true;btn.textContent="Signing in...";try{const cred=await signInWithEmailAndPassword(auth,document.getElementById("email").value.trim(),document.getElementById("password").value);if(!cred.user.emailVerified){alert("Email verification is required.");await signOut(auth);return;}location.href="index.html";}catch(err){alert("Login failed. Check your email and password.");}finally{btn.disabled=false;btn.textContent="Login";}});document.getElementById("google-btn").onclick=async()=>{try{const cred=await signInWithPopup(auth,new GoogleAuthProvider());const snap=await getDoc(doc(db,"users",cred.user.uid));location.href=snap.exists()?"index.html":"signup.html";}catch(err){alert("Google login failed.");}};document.getElementById("reset-btn").onclick=async()=>{const email=prompt("Enter your email address.");if(!email)return;try{await sendPasswordResetEmail
