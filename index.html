<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRTN</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --accent: #00E5FF;
            --text-main: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            scroll-behavior: smooth;
        }

        /* 1. 상단 Auth Bar (로고 포함) */
        .auth-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* 로고 이미지 스타일 */
        .nav-logo {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            background-color: white;
            object-fit: contain;
        }

        .auth-user-zone {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .auth-btn {
            background: transparent;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            padding: 6px 15px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .auth-btn:hover {
            background: var(--text-main);
            color: black;
        }

        /* 2. 메인 히어로 섹션 */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1538370965046-79c0d6907d47?q=80&w=2069') no-repeat center/cover;
            text-align: center;
            padding-top: 60px;
        }

        .hero h1 { font-size: 4rem; margin-bottom: 10px; }

        /* 3. 메인 네비게이션 메뉴 */
        .main-nav {
            display: flex;
            gap: 30px;
            margin-top: 40px;
        }

        .nav-item {
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.1rem;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        .nav-item:hover { border-bottom: 2px solid var(--accent); color: var(--accent); }

        /* 4. 컨텐츠 컨테이너 */
        .content-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            min-height: 200px;
        }

        /* 5. 푸터 */
        footer {
            background: #000;
            padding: 40px 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 600px) {
            .logo-area span { font-size: 16px; }
            nav a { padding: 10px 12px; font-size: 13px; }
            header h1 { font-size: 22px; }
            .header-logo { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

<div class="auth-bar">
    <a href="index.html" class="logo-link">
        <img src="SYRTN-logo-homepage.png" alt="SYRTN 로고" class="nav-logo">
        <span>SYRTN</span>
    </a>
    <div class="auth-user-zone" id="auth-zone">
        <a href="login.html" id="login-link" class="auth-btn">LOGIN</a>
        <span id="user-name" style="display:none; font-size: 0.9rem;"></span>
        <button id="logout-btn" class="auth-btn" style="display:none;">LOGOUT</button>
    </div>
</div>

<section class="hero">
    <h1>SYRTN Project</h1>
    <p>Suncheon-Yeonggwang Radio Telescope Network</p>
    
    <nav class="main-nav">
        <a href="index.html" class="nav-item">HOME</a>
        <a href="introduction.html" class="nav-item">INTRODUCTION</a>
        <a href="talk.html" class="nav-item">TALK</a>
        <a href="resource.html" class="nav-item">RESOURCE</a>
        <a href="suggest.html" class="nav-item">SUGGESTION</a>
        <a href="mypage.html" class="nav-item">MY PAGE</a>
        <a href="adjust.html" class="nav-item">REQUEST AUTHORITY</a>
        <a href="admin.html" class="nav-item">ADMIN</a>
    </nav>
</section>

<footer>
    <p>&copy; 2026 SYRTN Collaboration. All Rights Reserved.</p>
    <p>영광해룡고등학교 | 순천고등학교 | 순천복성고등학교 물리·천문·지구과학 동아리 연합</p>
    <p>designed by SYRTN Team | 문의 : 2jw5464@gmail.com</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    // [추가] App Check 라이브러리 임포트
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyB-0z16OPjp1wY0-U_EHKY9kbRCVba4DkU",
        authDomain: "syrt-2026.firebaseapp.com",
        projectId: "syrt-2026",
        storageBucket: "syrt-2026.firebasestorage.app",
        messagingSenderId: "848896876364",
        appId: "1:848896876364:web:42edc690489962f76df9e9",
        measurementId: "G-Q0BKR95VH2"
    };

    // 초기화
    const app = initializeApp(firebaseConfig);

    // --- [App Check 초기화] ---
    const appCheck = initializeAppCheck(app, {
        provider: new ReCaptchaV3Provider('6Lfnw9ksAAAAAAoBVTPO6fqtCUMeteYlsk5OYjnq'),
        isTokenAutoRefreshEnabled: true // 사용자가 페이지를 열어두는 동안 토큰을 자동으로 갱신합니다.
    });

    const auth = getAuth(app);

    const loginLink = document.getElementById('login-link');
    const logoutBtn = document.getElementById('logout-btn');
    const userName = document.getElementById('user-name');

    // 사용자 인증 상태 관찰
    onAuthStateChanged(auth, (user) => {
        if (user) {
            // 로그인 상태
            loginLink.style.display = 'none';
            userName.style.display = 'inline';
            logoutBtn.style.display = 'inline';
            userName.innerText = `${user.displayName || '사용자'}님`;
        } else {
            // 로그아웃 상태
            loginLink.style.display = 'inline';
            userName.style.display = 'none';
            logoutBtn.style.display = 'none';
        }
    });

    // 로그아웃 처리
    logoutBtn.onclick = () => {
        if (confirm("로그아웃 하시겠습니까?")) {
            signOut(auth).then(() => {
                alert("로그아웃 되었습니다.");
                location.reload();
            }).catch((error) => {
                console.error("로그아웃 에러:", error);
                alert("로그아웃 중 오류가 발생했습니다.");
            });
        }
    };
</script>
</body>
</html>
