<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="SYRTN-logo-homepage.png" type="image/png">
    <link rel="apple-touch-icon" href="SYRTN-logo-homepage.png">
    <title>SYRTN | Write</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/write.css">
</head>
<body>
<div class="auth-bar">
    <a href="index.html" class="logo-link"><img src="SYRTN-logo-homepage.png" alt="Logo" class="nav-logo"><span>SYRTN</span></a>
    <div class="auth-user-zone"><span id="user-name" style="display:none;"></span><button id="logout-btn" class="auth-btn" style="display:none;">LOGOUT</button></div>
</div>
<div class="container">
    <h2 id="formTitle">새 자료 등록</h2>
    <div class="write-card">
        <label>카테고리</label>
        <select id="category">
            <option value="천체 관측 데이터">천체 관측 데이터</option>
            <option value="기술 문서 / 매뉴얼">기술 문서 / 매뉴얼</option>
            <option value="발표 및 세미나">발표 및 세미나</option>
            <option value="소프트웨어 및 코드">소프트웨어 및 코드</option>
        </select>
        <label>자료 제목</label>
        <input type="text" id="postTitle" placeholder="제목을 입력하세요">
        <div class="link-input-group">
            <label>공유 링크 (구글 드라이브 등)</label>
            <div id="linkContainer">
                <div class="link-item">
                    <input type="text" class="postFileUrl" placeholder="링크 주소 (https://...)" style="flex:2; margin-bottom:0;">
                    <input type="text" class="postFileName" placeholder="이름 (예: 관측자료.zip)" style="flex:1; margin-bottom:0;">
                    <button type="button" id="btnAddLink" style="width:40px; background:var(--accent); color:black; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">+</button>
                </div>
            </div>
        </div>
        <label>첨부파일</label>
        <input type="file" id="fileInput" multiple>
        <p style="margin:-10px 0 20px; color:#888; font-size:13px;">파일 크기 제한 없이 업로드할 수 있습니다. 위험한 실행 파일 형식은 차단됩니다.</p>
        <label>설명</label>
        <textarea id="postContent" placeholder="자료에 대한 상세 설명을 입력하세요..."></textarea>
        <button id="submitBtn" class="btn-submit">자료 등록하기</button>
        <button class="btn-cancel" onclick="history.back()">취소</button>
    </div>
</div>
<footer>
  <p>&copy; 2026 SYRTN Collaboration. All Rights Reserved.</p>
  <p>영광 해룡고 | 순천고 | 순천 복성고 물리·지구과학 동아리</p>
  <p>designed by SYRTN Team | Contact: 2jw5464@gmail.com</p>
</footer>
<script type="module" src="js/write.js"></script>
<script type="module" src="frontend-access-control.js"></script>
</body>
</html>
