<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="SYRTN-logo-homepage.png" type="image/png">
    <link rel="apple-touch-icon" href="SYRTN-logo-homepage.png">
    <title>SYRTN | Write</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark:#050505; --accent:#00E5FF; --text-main:#fff; --card-bg:rgba(255,255,255,.05); --input-bg:rgba(255,255,255,.08); --nav-bg:rgba(0,0,0,.9); --border-color:rgba(255,255,255,.1); }
        body { margin:0; font-family:'Noto Sans KR',sans-serif; background:var(--bg-dark); color:var(--text-main); display:flex; flex-direction:column; min-height:100vh; }
        .auth-bar { position:fixed; top:0; width:100%; height:60px; background:var(--nav-bg); backdrop-filter:blur(10px); display:flex; justify-content:space-between; align-items:center; padding:0 40px; box-sizing:border-box; z-index:1000; border-bottom:1px solid var(--border-color); }
        .logo-link { display:flex; align-items:center; gap:12px; text-decoration:none; color:white; font-weight:700; letter-spacing:2px; }
        .nav-logo { height:40px; width:40px; border-radius:50%; background:white; object-fit:contain; }
        .auth-user-zone { display:flex; align-items:center; gap:15px; }
        .auth-btn { background:transparent; border:1px solid var(--text-main); color:var(--text-main); padding:6px 15px; cursor:pointer; text-decoration:none; border-radius:4px; font-size:.85rem; transition:.3s; }
        .auth-btn:hover { background:var(--text-main); color:black; }
        #user-name { color:var(--accent) !important; font-weight:bold; font-size:.9rem; margin-right:10px; }
        .container { max-width:800px; margin:100px auto 40px; padding:0 20px; width:100%; box-sizing:border-box; }
        .write-card { background:var(--card-bg); padding:30px; border-radius:15px; border:1px solid rgba(255,255,255,.1); }
        h2 { text-align:center; color:var(--accent); margin-bottom:30px; }
        label { display:block; margin-bottom:8px; font-size:14px; color:#7fc7ff; font-weight:bold; }
        input, textarea, select { width:100%; padding:12px; margin-bottom:20px; background:var(--input-bg); border:1px solid rgba(255,255,255,.2); color:white; border-radius:8px; outline:none; font-size:16px; box-sizing:border-box; }
        textarea { height:300px; resize:none; line-height:1.6; }
        select option { background-color:#1a1a1a; color:#fff; }
        .link-input-group { margin-bottom:25px; padding:20px; background:rgba(0,229,255,.03); border-radius:10px; border:1px dashed var(--accent); }
        .link-item { display:flex; gap:10px; margin-bottom:10px; }
        .btn-submit { width:100%; padding:18px; background:transparent; color:var(--accent); border:2px solid var(--accent); border-radius:10px; font-weight:bold; cursor:pointer; font-size:16px; transition:.3s; }
        .btn-submit:hover { background:var(--accent); color:#000; }
        .btn-cancel { width:100%; padding:12px; background:transparent; color:#888; border:none; margin-top:10px; cursor:pointer; }
        footer { text-align:center; padding:60px; color:#444; font-size:.8rem; border-top:1px solid var(--border-color); }
        @media (max-width:600px) { .auth-bar { padding:0 18px; } .link-item { flex-direction:column; } }
    
        /* Unified responsive navigation */
        .auth-bar {
            height: 60px !important;
            padding: 0 clamp(16px, 4vw, 40px) !important;
            gap: 16px !important;
        }
        .logo-link {
            min-width: 0 !important;
            flex: 0 1 auto !important;
            letter-spacing: 1.2px !important;
            white-space: nowrap !important;
        }
        .nav-logo {
            width: 40px !important;
            height: 40px !important;
            flex: 0 0 40px !important;
        }
        .auth-user-zone {
            min-width: 0 !important;
            flex: 0 1 auto !important;
            justify-content: flex-end !important;
            gap: 10px !important;
        }
        .auth-btn {
            min-height: 32px !important;
            padding: 6px 14px !important;
            box-sizing: border-box !important;
            white-space: nowrap !important;
            line-height: 1.2 !important;
        }
        .sub-nav-container {
            height: 52px !important;
            top: 60px !important;
            overflow-x: auto !important;
            overflow-y: hidden !important;
            -webkit-overflow-scrolling: touch !important;
            scrollbar-width: thin !important;
        }
        .nav-menu {
            min-height: 52px !important;
            width: max-content !important;
            min-width: 100% !important;
            display: flex !important;
            flex-wrap: nowrap !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 0 !important;
            padding: 0 16px !important;
            box-sizing: border-box !important;
        }
        .nav-menu a {
            height: 52px !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 0 14px !important;
            box-sizing: border-box !important;
            font-size: 0.9rem !important;
            line-height: 1.1 !important;
            letter-spacing: 0.8px !important;
            white-space: nowrap !important;
            flex: 0 0 auto !important;
        }
        .nav-menu a.active::after {
            bottom: 8px !important;
        }
        @media (max-width: 700px) {
            .auth-bar {
                height: 56px !important;
                padding: 0 14px !important;
            }
            .logo-link span {
                font-size: 0.95rem !important;
            }
            .nav-logo {
                width: 34px !important;
                height: 34px !important;
                flex-basis: 34px !important;
            }
            .auth-user-zone {
                gap: 8px !important;
            }
            .auth-user-zone span[id*="user"], #user-name, #userNameDisplay {
                max-width: 34vw !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
                white-space: nowrap !important;
            }
            .auth-btn {
                min-height: 30px !important;
                padding: 5px 10px !important;
                font-size: 0.78rem !important;
            }
            .sub-nav-container {
                top: 56px !important;
                height: 48px !important;
            }
            .nav-menu {
                min-height: 48px !important;
                justify-content: flex-start !important;
                padding: 0 10px !important;
            }
            .nav-menu a {
                height: 48px !important;
                padding: 0 11px !important;
                font-size: 0.78rem !important;
                letter-spacing: 0.4px !important;
            }
            header.intro-hero,
            header.board-hero {
                min-height: 260px !important;
                height: 38vh !important;
                padding-top: 56px !important;
            }
            .intro-hero h1,
            .board-hero h1,
            header h1 {
                font-size: clamp(2rem, 10vw, 2.6rem) !important;
                line-height: 1.12 !important;
                padding: 0 16px !important;
                box-sizing: border-box !important;
            }
            .intro-hero p,
            .board-hero p {
                font-size: 0.95rem !important;
                padding: 0 18px !important;
                box-sizing: border-box !important;
            }
            .content-section,
            .container {
                width: 100% !important;
                max-width: 100% !important;
                padding-left: 16px !important;
                padding-right: 16px !important;
                box-sizing: border-box !important;
            }
        }

        .sub-nav-container { scrollbar-width:none !important; -ms-overflow-style:none !important; }
        .sub-nav-container::-webkit-scrollbar { display:none; width:0; height:0; }
</style>
</head>
<body>
<div class="auth-bar">
    <a href="index.html" class="logo-link"><img src="SYRTN-logo-homepage.png" alt="Logo" class="nav-logo"><span>SYRTN</span></a>
    <div class="auth-user-zone"><span id="user-name" style="display:none;"></span><button id="logout-btn" class="auth-btn" style="display:none;">LOGOUT</button></div>
</div>
<div class="container">
    <h2 id="formTitle">새 자료 등록</h2>
    <div class="write-card">
        <label>카테고리</label>
        <select id="category">
            <option value="천체 관측 데이터">천체 관측 데이터</option>
            <option value="기술 문서 / 매뉴얼">기술 문서 / 매뉴얼</option>
            <option value="발표 및 세미나">발표 및 세미나</option>
            <option value="소프트웨어 및 코드">소프트웨어 및 코드</option>
        </select>
        <label>자료 제목</label>
        <input type="text" id="postTitle" placeholder="제목을 입력하세요">
        <div class="link-input-group">
            <label>공유 링크 (구글 드라이브 등)</label>
            <div id="linkContainer">
                <div class="link-item">
                    <input type="text" class="postFileUrl" placeholder="링크 주소 (https://...)" style="flex:2; margin-bottom:0;">
                    <input type="text" class="postFileName" placeholder="이름 (예: 관측자료.zip)" style="flex:1; margin-bottom:0;">
                    <button type="button" id="btnAddLink" style="width:40px; background:var(--accent); color:black; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">+</button>
                </div>
            </div>
        </div>
        <label>첨부파일</label>
        <input type="file" id="fileInput" multiple>
        <p style="margin:-10px 0 20px; color:#888; font-size:13px;">파일 크기 제한 없이 업로드할 수 있습니다. 위험한 실행 파일 형식은 차단됩니다.</p>
        <label>설명</label>
        <textarea id="postContent" placeholder="자료에 대한 상세 설명을 입력하세요..."></textarea>
        <button id="submitBtn" class="btn-submit">자료 등록하기</button>
        <button class="btn-cancel" onclick="history.back()">취소</button>
    </div>
</div>
<footer>
  <p>&copy; 2026 SYRTN Collaboration. All Rights Reserved.</p>
  <p>영광 해룡고 | 순천고 | 순천 복성고 물리·지구과학 동아리</p>
  <p>designed by SYRTN Team | Contact: 2jw5464@gmail.com</p>
</footer>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const API_BASE_URL = "https://hypocrite-depletion-until.ngrok-free.dev";
    const COLLECTION = "resources";
    const ADMIN_EMAIL = "2jw5464@gmail.com";
    const WRITABLE_ROLES = ['s-leader', 'b-leader', 'h-leader', 'teacher', 'admin'];
    const firebaseConfig = { apiKey:"AIzaSyB-0z16OPjp1wY0-U_EHKY9kbRCVba4DkU", authDomain:"syrt-2026.firebaseapp.com", projectId:"syrt-2026", storageBucket:"syrt-2026.firebasestorage.app", messagingSenderId:"848896876364", appId:"1:848896876364:web:42edc690489962f76df9e9" };
    const app = initializeApp(firebaseConfig);
    initializeAppCheck(app, { provider:new ReCaptchaV3Provider('6Lfnw9ksAAAAAAoBVTPO6fqtCUMeteYlsk5OYjnq'), isTokenAutoRefreshEnabled:true });
    const auth = getAuth(app);
    const db = getFirestore(app);
    const editPostId = new URLSearchParams(window.location.search).get('id');
    let currentUser = null;
    let currentRole = 'guest';
    let currentUserName = '익명';

    const logoutBtn = document.getElementById('logout-btn');
    logoutBtn.addEventListener('click', async () => { if (confirm('로그아웃 하시겠습니까?')) { await signOut(auth); location.replace('index.html'); } });
    document.getElementById('btnAddLink').addEventListener('click', () => addLinkField());

    onAuthStateChanged(auth, async (user) => {
        if (!user) { alert('로그인이 필요합니다.'); location.replace('login.html'); return; }
        try {
            const userDocSnap = await getDoc(doc(db, 'users', user.uid));
            if (!userDocSnap.exists()) { alert('사용자 정보를 찾을 수 없습니다.'); location.replace('index.html'); return; }
            const userData = userDocSnap.data();
            currentRole = user.email === ADMIN_EMAIL ? 'admin' : (userData.role || 'member');
            if (!WRITABLE_ROLES.includes(currentRole)) { alert('작성 권한이 없습니다. 각 학교별 리더 이상만 가능합니다.'); location.replace('resource.html'); return; }
            currentUser = user;
            currentUserName = userData.name || user.displayName || '사용자';
            document.getElementById('user-name').style.display = 'inline';
            document.getElementById('user-name').innerText = `${currentUserName}님`;
            logoutBtn.style.display = 'inline';
            if (editPostId) await loadEditData();
        } catch (error) {
            console.error(error);
            alert('권한 확인 중 오류가 발생했습니다.');
            location.replace('resource.html');
        }
    });

    async function getHeaders(contentType = false) {
        const headers = { 'Authorization': `Bearer ${await currentUser.getIdToken()}`, 'X-User-Role': currentRole, 'ngrok-skip-browser-warning': '69420' };
        if (contentType) headers['Content-Type'] = 'application/json';
        return headers;
    }

    async function loadEditData() {
        document.getElementById('formTitle').innerText = '자료 수정하기';
        document.getElementById('submitBtn').innerText = '수정 완료';
        const res = await fetch(`${API_BASE_URL}/api/syrtn/board/${COLLECTION}/${editPostId}`, { headers: await getHeaders() });
        if (!res.ok) { alert('자료를 찾을 수 없습니다.'); location.replace('resource.html'); return; }
        const data = await res.json();
        const canEdit = data.uid === currentUser.uid || WRITABLE_ROLES.includes(currentRole) || currentUser.email === ADMIN_EMAIL;
        if (!canEdit) { alert('수정 권한이 없습니다.'); location.replace('resource.html'); return; }
        document.getElementById('postTitle').value = data.title || '';
        document.getElementById('postContent').value = data.content || data.description || '';
        document.getElementById('category').value = data.category || '천체 관측 데이터';
        if (data.links && data.links.length > 0) {
            document.getElementById('linkContainer').innerHTML = '';
            data.links.forEach(link => addLinkField(link.url, link.name));
        }
    }

    async function submitPost() {
        const title = document.getElementById('postTitle').value.trim();
        const content = document.getElementById('postContent').value.trim();
        const category = document.getElementById('category').value;
        if (!title || !content) { alert('제목과 내용을 입력해주세요.'); return; }
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = '처리 중...';
        const links = Array.from(document.querySelectorAll('.postFileUrl')).map((input, index) => {
            let url = input.value.trim();
            if (!url) return null;
            if (!url.startsWith('http')) url = 'https://' + url;
            const name = document.querySelectorAll('.postFileName')[index].value.trim() || '첨부 링크';
            return { url, name, type: url.includes('/api/syrtn/uploads/') ? 'file' : 'link' };
        }).filter(Boolean);
        try {
            const uploadedFiles = await uploadSelectedFiles();
            links.push(...uploadedFiles);
            const url = editPostId ? `${API_BASE_URL}/api/syrtn/board/${COLLECTION}/${editPostId}` : `${API_BASE_URL}/api/syrtn/board/${COLLECTION}`;
            const res = await fetch(url, { method: editPostId ? 'PUT' : 'POST', headers: await getHeaders(true), body: JSON.stringify({ title, content, category, links, authorName: currentUserName }) });
            if (!res.ok) { const data = await res.json().catch(() => ({})); throw new Error(data.error || '저장 실패'); }
            alert(editPostId ? '수정되었습니다.' : '등록되었습니다.');
            location.replace('resource.html');
        } catch (err) {
            alert('저장 실패: ' + err.message);
            submitBtn.disabled = false;
            submitBtn.innerText = editPostId ? '수정 완료' : '자료 등록하기';
        }
    }

    async function uploadSelectedFiles() {
        const files = Array.from(document.getElementById('fileInput')?.files || []);
        const uploaded = [];
        for (const file of files) {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch(`${API_BASE_URL}/api/syrtn/uploads/${COLLECTION}`, {
                method: 'POST',
                headers: await getHeaders(false),
                body: formData
            });
            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                throw new Error(`${file.name}: ${data.error || '업로드 실패'}`);
            }
            uploaded.push(await res.json());
        }
        return uploaded;
    }

    function addLinkField(url = '', name = '') {
        const div = document.createElement('div');
        div.className = 'link-item';
        div.innerHTML = `<input type="text" class="postFileUrl" value="${escapeAttr(url)}" placeholder="링크 주소 (https://...)" style="flex:2; margin-bottom:0;"><input type="text" class="postFileName" value="${escapeAttr(name)}" placeholder="이름" style="flex:1; margin-bottom:0;"><button type="button" class="btn-remove-link" style="width:40px; background:#ff4d4d; color:white; border:none; border-radius:5px; cursor:pointer;">-</button>`;
        document.getElementById('linkContainer').appendChild(div);
        div.querySelector('.btn-remove-link').onclick = () => div.remove();
    }
    function escapeAttr(value) { return String(value || '').replaceAll('&', '&amp;').replaceAll('"', '&quot;').replaceAll('<', '&lt;').replaceAll('>', '&gt;'); }
    document.getElementById('submitBtn').addEventListener('click', submitPost);
</script>
<script type="module" src="frontend-access-control.js"></script>
</body>
</html>
