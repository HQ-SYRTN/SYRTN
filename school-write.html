<main class="container">
    <section class="editor">
        <h1 id="form-title">자료 등록</h1>
        <label for="category">카테고리</label>
        <select id="category"><option value="천체 관측 데이터">천체 관측 데이터</option><option value="실험 보고서">실험 보고서</option><option value="훈련 자료">훈련 자료</option><option value="소스 코드">소스 코드</option><option value="기타">기타</option></select>
        <label for="post-title">제목</label>
        <input id="post-title" type="text" placeholder="제목을 입력하세요.">
        <label for="post-content">내용</label>
        <textarea id="post-content" placeholder="자료에 대한 설명을 입력하세요."></textarea>
        <p class="field-label">첨부 링크</p>
        <div id="link-container"></div>
        <button class="btn" id="add-link" type="button">링크 추가</button>
        <label for="file-input">첨부파일</label>
        <input type="file" id="file-input" multiple>
        <p style="margin:8px 0 0; color:#888; font-size:13px;">파일 크기 제한 없이 업로드할 수 있습니다. 위험한 실행 파일 형식은 차단됩니다.</p>
        <div class="actions"><button class="btn" id="cancel-btn">취소</button><button class="btn btn-primary" id="submit-btn">등록</button></div>
    </section>
</main>
