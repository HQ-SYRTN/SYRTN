<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="SYRTN-logo-homepage.png" type="image/png">
    <link rel="apple-touch-icon" href="SYRTN-logo-homepage.png">
    <title>SYRTN | View</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark:#050505; --accent:#00E5FF; --text-main:#fff; --card-bg:rgba(255,255,255,.04); --nav-bg:rgba(0,0,0,.9); --border-color:rgba(255,255,255,.1); }
        body, html { margin:0; padding:0; font-family:'Noto Sans KR',sans-serif; background:var(--bg-dark); color:var(--text-main); line-height:1.6; }
        .auth-bar { position:fixed; top:0; width:100%; height:60px; background:var(--nav-bg); backdrop-filter:blur(10px); display:flex; justify-content:space-between; align-items:center; padding:0 clamp(16px,4vw,40px); box-sizing:border-box; z-index:1000; border-bottom:1px solid var(--border-color); gap:16px; }
        .logo-link { display:flex; align-items:center; gap:12px; text-decoration:none; color:white; font-weight:700; letter-spacing:1.2px; white-space:nowrap; }
        .nav-logo { width:40px; height:40px; flex:0 0 40px; border-radius:50%; background:white; object-fit:contain; }
        .auth-user-zone { display:flex; align-items:center; justify-content:flex-end; gap:10px; min-width:0; }
        #user-name { color:var(--accent); font-weight:700; font-size:.9rem; }
        .auth-btn, .btn-small, .btn-primary { background:transparent; border:1px solid var(--text-main); color:var(--text-main); min-height:32px; padding:6px 14px; box-sizing:border-box; cursor:pointer; text-decoration:none; border-radius:4px; font-size:.85rem; line-height:1.2; white-space:nowrap; }
        .auth-btn:hover { background:var(--text-main); color:#000; }
        .sub-nav-container { width:100%; height:52px; background:#111; position:sticky; top:60px; z-index:900; overflow-x:auto; border-bottom:1px solid var(--border-color); }
        .nav-menu { min-height:52px; width:max-content; min-width:100%; display:flex; align-items:center; justify-content:center; padding:0 16px; box-sizing:border-box; }
        .nav-menu a { height:52px; display:inline-flex; align-items:center; padding:0 14px; color:rgba(255,255,255,.7); text-decoration:none; font-size:.9rem; letter-spacing:.8px; white-space:nowrap; }
        .nav-menu a:hover, .nav-menu a.active { color:var(--accent); }
        .container { width:100%; max-width:900px; margin:120px auto 90px; padding:0 20px; box-sizing:border-box; }
        .post-card, .comment-panel { background:var(--card-bg); border:1px solid var(--border-color); border-radius:8px; padding:28px; box-sizing:border-box; }
        .post-meta, .comment-meta { display:flex; flex-wrap:wrap; gap:10px; color:#888; font-size:.85rem; margin-bottom:18px; }
        .tag { font-size:.72rem; padding:3px 9px; border-radius:4px; background:rgba(0,229,255,.1); color:var(--accent); border:1px solid var(--accent); }
        h1 { margin:0 0 14px; font-size:clamp(1.8rem,5vw,2.5rem); line-height:1.2; }
        .content { white-space:pre-wrap; color:#ddd; margin-top:24px; }
        .links { margin-top:24px; display:flex; flex-direction:column; gap:8px; }
        .links a { color:var(--accent); word-break:break-all; }
        .attachment-item { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 14px; border:1px solid rgba(0,229,255,.45); border-radius:8px; background:rgba(0,229,255,.08); }
        .attachment-name { color:white; word-break:break-all; }
        .attachment-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
        .attachment-actions .btn-small { color:#ddd; background:rgba(255,255,255,.04); }
        .attachment-actions .btn-small:hover { color:#000; background:var(--accent); border-color:var(--accent); }
        .actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; margin-top:24px; }
        .btn-primary { border-color:var(--accent); color:var(--accent); }
        .btn-danger { color:#ff4d4d; border-color:#ff4d4d; }
        .hidden { display:none !important; }
        .comment-panel { margin-top:22px; }
        .comment-form { display:flex; gap:10px; margin-bottom:20px; }
        .comment-input { flex:1; min-width:0; background:rgba(0,0,0,.3); border:1px solid var(--border-color); color:white; border-radius:6px; padding:10px 12px; }
        .comment { border-top:1px solid var(--border-color); padding:16px 0; }
        .comment:first-child { border-top:0; }
        footer { text-align:center; padding:50px 20px; color:#444; font-size:.8rem; border-top:1px solid var(--border-color); }
        @media (max-width:700px) {
            .auth-bar { height:56px; padding:0 14px; }
            .nav-logo { width:34px; height:34px; flex-basis:34px; }
            #user-name { max-width:34vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
            .auth-btn { min-height:30px; padding:5px 10px; font-size:.78rem; }
            .sub-nav-container { top:56px; height:48px; }
            .nav-menu { min-height:48px; justify-content:flex-start; padding:0 10px; }
            .nav-menu a { height:48px; padding:0 11px; font-size:.78rem; letter-spacing:.4px; }
            .container { margin-top:94px; padding:0 16px; }
            .post-card, .comment-panel { padding:20px; }
            .comment-form { flex-direction:column; }
        }
    </style>
</head>
<body>
<div class="auth-bar">
    <a href="index.html" class="logo-link"><img src="SYRTN-logo-homepage.png" alt="Logo" class="nav-logo"><span>SYRTN</span></a>
    <div class="auth-user-zone"><a href="login.html" id="login-link" class="auth-btn">LOGIN</a><span id="user-name" style="display:none;"></span><button id="logout-btn" class="auth-btn" style="display:none;">LOGOUT</button></div>
</div>
<nav class="sub-nav-container"><div class="nav-menu"><a href="index.html">HOME</a><a href="introduction.html">INTRODUCTION</a><a href="talk.html" class="active">TALK</a><a href="resource.html">RESOURCE</a><a href="suggest.html">SUGGESTION</a><a href="mypage.html">MY PAGE</a><a href="adjust.html">REQUEST AUTHORITY</a><a href="admin.html">ADMIN</a></div></nav>

<main class="container">
    <article class="post-card">
        <div class="post-meta"><span class="tag" id="post-category">-</span><span id="post-author">-</span><span id="post-date">-</span></div>
        <h1 id="post-title">불러오는 중...</h1>
        <div id="post-content" class="content"></div>
        <div id="post-links" class="links"></div>
        <div class="actions">
            <button id="btn-edit" class="btn-small btn-primary hidden">수정</button>
            <button id="btn-delete" class="btn-small btn-danger hidden">삭제</button>
            <button id="btn-list" class="btn-small">목록</button>
        </div>
    </article>

    <section class="comment-panel">
        <div class="comment-form"><input id="comment-input" class="comment-input" type="text" placeholder="의견을 남겨보세요."><button id="comment-submit" class="btn-primary">등록</button></div>
        <div id="comment-list"></div>
    </section>
</main>

<footer>
  <p>&copy; 2026 SYRTN Collaboration. All Rights Reserved.</p>
  <p>영광 해룡고 | 순천고 | 순천 복성고 물리·지구과학 동아리</p>
  <p>designed by SYRTN Team | Contact: 2jw5464@gmail.com</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const API_BASE_URL = "https://hypocrite-depletion-until.ngrok-free.dev";
    const ADMIN_EMAIL = "2jw5464@gmail.com";
    const SCHOOLS = {
        s: { collection:"s-resources", student:"s-student", leader:"s-leader", boardUrl:"school-board.html?school=s", writeUrl:"school-write.html?school=s" },
        h: { collection:"h-resources", student:"h-student", leader:"h-leader", boardUrl:"school-board.html?school=h", writeUrl:"school-write.html?school=h" }
    };
    const params = new URLSearchParams(location.search);
    const school = SCHOOLS[params.get("school")];
    const postId = params.get("id");
    if (!school || !postId) {
        location.replace("talk.html");
        throw new Error("Invalid school or post id.");
    }

    const firebaseConfig = { apiKey:"AIzaSyB-0z16OPjp1wY0-U_EHKY9kbRCVba4DkU", authDomain:"syrt-2026.firebaseapp.com", projectId:"syrt-2026", storageBucket:"syrt-2026.firebasestorage.app", messagingSenderId:"848896876364", appId:"1:848896876364:web:42edc690489962f76df9e9" };
    const app = initializeApp(firebaseConfig);
    initializeAppCheck(app, { provider:new ReCaptchaV3Provider("6Lfnw9ksAAAAAAoBVTPO6fqtCUMeteYlsk5OYjnq"), isTokenAutoRefreshEnabled:true });
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentRole = "guest";
    let currentUserName = "익명";
    let post = null;

    const roleAllowed = (role) => ["admin", "teacher", school.student, school.leader].includes(role);
    const canManagePost = () => post && currentUser && (post.uid === currentUser.uid || ["admin", "teacher", school.leader].includes(currentRole));
    const headers = async () => ({ "Authorization": `Bearer ${await currentUser.getIdToken()}`, "X-User-Role": currentRole, "ngrok-skip-browser-warning": "69420" });
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch]));
    const safeUrl = (value) => {
        try {
            const raw = String(value || "").trim();
            const base = raw.startsWith("/api/") ? API_BASE_URL : location.href;
            const url = new URL(raw, base);
            if (url.pathname.startsWith("/api/syrtn/uploads/")) {
                const api = new URL(API_BASE_URL);
                return `${api.origin}${url.pathname}${url.search}`;
            }
            return ["http:", "https:"].includes(url.protocol) ? url.href : "";
        } catch {
            return "";
        }
    };
    const isFileAttachment = (link, href) => link?.type === "file" || href.includes("/api/syrtn/uploads/");

    document.getElementById("logout-btn").onclick = async () => { if (confirm("로그아웃 하시겠습니까?")) { await signOut(auth); location.href = "index.html"; } };
    document.getElementById("btn-list").onclick = () => location.href = school.boardUrl;
    document.getElementById("btn-edit").onclick = () => location.href = `${school.writeUrl}&id=${postId}`;
    document.getElementById("btn-delete").onclick = deletePost;
    document.getElementById("comment-submit").onclick = createComment;

    onAuthStateChanged(auth, async (user) => {
        if (!user) { location.replace("block.html"); return; }
        try {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (!snap.exists()) { location.replace("block.html"); return; }
            const data = snap.data();
            const role = user.email === ADMIN_EMAIL ? "admin" : (data.role || "member");
            if (!roleAllowed(role)) { location.replace("block.html"); return; }
            currentUser = user;
            currentRole = role;
            currentUserName = data.name || "익명";
            document.getElementById("user-name").style.display = "inline";
            document.getElementById("user-name").textContent = `${currentUserName}님`;
            document.getElementById("logout-btn").style.display = "inline";
            document.getElementById("login-link").style.display = "none";
            await loadPost();
            await loadComments();
        } catch (err) {
            console.error(err);
            location.replace("block.html");
        }
    });

    async function loadPost() {
        const res = await fetch(`${API_BASE_URL}/api/syrtn/board/${school.collection}/${postId}`, { headers: await headers() });
        if (!res.ok) { location.replace("block.html"); return; }
        post = await res.json();
        document.title = `SYRTN | ${post.title || "게시글"}`;
        document.getElementById("post-category").textContent = post.category || "기타";
        document.getElementById("post-author").textContent = post.author_name || "익명";
        document.getElementById("post-date").textContent = post.created_at ? new Date(post.created_at).toLocaleString() : "-";
        document.getElementById("post-title").textContent = post.title || "제목 없음";
        document.getElementById("post-content").textContent = post.content || "";
        const linksEl = document.getElementById("post-links");
        linksEl.innerHTML = "";
        (post.links || []).forEach((link, index) => {
            const href = safeUrl(link.url);
            if (!href) return;
            const isFile = isFileAttachment(link, href);
            if (isFile) {
                const name = link.name || `첨부파일 ${index + 1}`;
                const item = document.createElement("div");
                item.className = "attachment-item";
                const nameEl = document.createElement("span");
                nameEl.className = "attachment-name";
                nameEl.textContent = name;
                const actions = document.createElement("div");
                actions.className = "attachment-actions";
                const previewBtn = document.createElement("button");
                previewBtn.type = "button";
                previewBtn.className = "btn-small";
                previewBtn.textContent = "미리보기";
                previewBtn.onclick = () => openAttachment(href, name, "preview");
                const downloadBtn = document.createElement("button");
                downloadBtn.type = "button";
                downloadBtn.className = "btn-small";
                downloadBtn.textContent = "다운로드";
                downloadBtn.onclick = () => openAttachment(href, name, "download");
                actions.append(previewBtn, downloadBtn);
                item.append(nameEl, actions);
                linksEl.appendChild(item);
                return;
            }
            const a = document.createElement("a");
            a.href = href;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.textContent = link.name || href;
            linksEl.appendChild(a);
        });
        document.getElementById("btn-edit").classList.toggle("hidden", !canManagePost());
        document.getElementById("btn-delete").classList.toggle("hidden", !canManagePost());
    }

    async function loadComments() {
        const res = await fetch(`${API_BASE_URL}/api/syrtn/board/${school.collection}/${postId}/comments`, { headers: await headers() });
        const list = document.getElementById("comment-list");
        if (!res.ok) { list.innerHTML = ""; return; }
        const comments = await res.json();
        if (comments.length === 0) { list.innerHTML = '<p style="color:#777; text-align:center;">첫 댓글을 남겨보세요.</p>'; return; }
        list.innerHTML = comments.map(c => {
            const canDelete = c.uid === currentUser.uid || canManagePost();
            return `<div class="comment"><div class="comment-meta"><strong>${escapeHtml(c.author_name || "익명")}</strong><span>${c.created_at ? new Date(c.created_at).toLocaleString() : ""}</span>${canDelete ? `<button class="btn-small btn-danger" onclick="deleteComment(${c.id})">삭제</button>` : ""}</div><div>${escapeHtml(c.content || "")}</div></div>`;
        }).join("");
    }

    function withDownloadParam(url) {
        const downloadUrl = new URL(url);
        downloadUrl.searchParams.set("download", "1");
        return downloadUrl.href;
    }

    async function openAttachment(url, filename, mode = "preview") {
        try {
            if (!currentUser) throw new Error("로그인이 필요합니다.");
            const requestUrl = mode === "download" ? withDownloadParam(url) : url;
            const res = await fetch(requestUrl, { headers: await headers() });
            if (!res.ok) throw new Error("파일을 열 수 없습니다.");
            const blob = await res.blob();
            const objectUrl = URL.createObjectURL(blob);
            if (mode === "download") {
                const a = document.createElement("a");
                a.href = objectUrl;
                a.download = filename;
                a.click();
                setTimeout(() => URL.revokeObjectURL(objectUrl), 60000);
                return;
            }
            const opened = window.open(objectUrl, "_blank", "noopener,noreferrer");
            if (!opened) {
                const a = document.createElement("a");
                a.href = objectUrl;
                a.download = filename;
                a.click();
            }
            setTimeout(() => URL.revokeObjectURL(objectUrl), 60000);
        } catch (err) {
            alert(err.message || "파일을 열 수 없습니다.");
        }
    }

    async function createComment() {
        const input = document.getElementById("comment-input");
        const content = input.value.trim();
        if (!content) return;
        const res = await fetch(`${API_BASE_URL}/api/syrtn/board/${school.collection}/${postId}/comments`, { method:"POST", headers:{ ...(await headers()), "Content-Type":"application/json" }, body:JSON.stringify({ content, authorName:currentUserName }) });
        if (res.ok) { input.value = ""; await loadComments(); }
        else alert("댓글 등록 권한이 없거나 오류가 발생했습니다.");
    }

    window.deleteComment = async (commentId) => {
        if (!confirm("댓글을 삭제하시겠습니까?")) return;
        const res = await fetch(`${API_BASE_URL}/api/syrtn/board/${school.collection}/${postId}/comments/${commentId}`, { method:"DELETE", headers: await headers() });
        if (res.ok) await loadComments();
        else alert("댓글 삭제 권한이 없거나 오류가 발생했습니다.");
    };

    async function deletePost() {
        if (!confirm("게시글을 삭제하시겠습니까?")) return;
        const res = await fetch(`${API_BASE_URL}/api/syrtn/board/${school.collection}/${postId}`, { method:"DELETE", headers: await headers() });
        if (res.ok) location.href = school.boardUrl;
        else alert("삭제 권한이 없거나 오류가 발생했습니다.");
    }
</script>
<script type="module" src="frontend-access-control.js"></script>
</body>
</html>
