<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="SYRTN-logo-homepage.png" type="image/png">
    <link rel="apple-touch-icon" href="SYRTN-logo-homepage.png">
    <title>SYRTN | View</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #050505; --accent: #00E5FF; --card-bg: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: var(--bg-dark); color: white; line-height: 1.6; padding-top: 70px; }
        /* Auth Bar Style */
        .auth-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .nav-logo { width: 38px; height: 38px; border-radius: 50%; background: white; padding: 2px; }
        .auth-user-zone { display: flex; align-items: center; gap: 15px; }
        .user-name-tag { font-size: 0.9rem; color: #ccc; }
        .auth-btn { 
            text-decoration: none; color: white; border: 1px solid var(--border); 
            padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 700;
            transition: 0.3s; cursor: pointer; background: transparent;
        }
        .auth-btn:hover { background: var(--accent); color: black; border-color: var(--accent); }
        .container { max-width: 850px; margin: 60px auto; padding: 0 20px; }
        .view-card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border); padding: 45px; position: relative; }
        .post-header { border-bottom: 1px solid var(--border); margin-bottom: 35px; padding-bottom: 25px; }
        .post-category { color: var(--accent); font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; }
        .post-title { font-size: 2.2rem; margin: 0 0 15px 0; }
        .post-info { font-size: 14px; color: #777; display: flex; justify-content: space-between; }
        .post-content { font-size: 1.1rem; color: #ccc; white-space: pre-wrap; min-height: 200px; margin-bottom: 50px; }
        
        .links-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
        .link-item { background: rgba(0, 229, 255, 0.1); border: 1px solid var(--accent); padding: 12px 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; transition: 0.3s; }
        .link-item:hover { background: var(--accent); color: black; }
        .link-name { font-weight: bold; }

        .admin-zone { position: absolute; top: 45px; right: 45px; display: flex; gap: 10px; }
        .btn-small { padding: 5px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; border: 1px solid #555; background: transparent; color: #ccc; }
        .btn-small:hover { background: white; color: black; }

        .comment-section { margin-top: 50px; border-top: 1px solid var(--border); padding-top: 40px; }
        .comment-title { font-size: 1.3rem; color: var(--accent); margin-bottom: 25px; }
        .comment-item { background: rgba(255, 255, 255, 0.02); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .comment-meta { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 8px; }
        .comment-author { color: var(--accent); font-weight: bold; }
        .comment-actions { display: flex; gap: 8px; }
        .comment-form { display: flex; gap: 12px; margin-top: 30px; }
        .comment-input { flex: 1; background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border); border-radius: 10px; color: white; padding: 15px; outline: none; }
        .btn-comment { background: var(--accent); border: none; padding: 0 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .user-name-tag { 
    font-size: 0.9rem; 
    color: #ffffff; /* 가독성을 위해 흰색으로 변경 */
    font-weight: 500;
    margin-right: 5px; /* 버튼과의 간격 */
}
        
        .hidden { display: none; }
        footer { text-align: center; padding: 60px; color: #444; font-size: 0.8rem; border-top: 1px solid var(--border); }
    
        @media (max-width: 600px) {
            .logo-area span { font-size: 16px; }
            nav a { padding: 10px 12px; font-size: 13px; }
            header h1 { font-size: 22px; }
            .header-logo { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <div class="auth-bar">
    <a href="index.html" class="logo-link">
        <img src="SYRTN-logo-homepage.png" alt="Logo" class="nav-logo">
        <span>SYRTN</span>
    </a>
    <div class="auth-user-zone">
        <span id="userNameDisplay" class="user-name-tag hidden"></span>
        <a href="login.html" id="loginBtn" class="auth-btn">LOGIN</a>
        <button id="logoutBtn" class="auth-btn hidden">LOGOUT</button>
    </div>
</div>


<div class="container">
    <div class="view-card">
        <div class="admin-zone" id="postAdminZone">
            <button class="btn-small hidden" id="btnEditPost">수정</button>
            <button class="btn-small hidden" id="btnDeletePost">삭제</button>
        </div>

        <div class="post-header">
            <div id="viewCategory" class="post-category">해룡고 전용 자료실</div>
            <h1 id="viewTitle" class="post-title">LOADING...</h1>
            <div class="post-info">
                <span id="viewAuthor">-</span>
                <span id="viewDate">-</span>
            </div>
        </div>
        
        <div id="viewContent" class="post-content"></div>

        <div class="links-container" id="linksContainer"></div>

        <div class="comment-section">
            <div class="comment-title">COMMENTS</div>
            <div id="commentList"></div>
            
            <div id="commentFormArea" class="hidden">
                <div class="comment-form">
                    <input type="text" id="commentInput" class="comment-input" placeholder="해룡고 부원들과 의견을 나눠보세요.">
                    <button class="btn-comment" id="btnPostComment">POST</button>
                </div>
            </div>
            <div id="loginNotice" class="login-notice hidden" style="text-align: center; color: #888;">
                댓글 작성을 위해 <a href="login.html" style="color:var(--accent)">로그인</a>이 필요합니다.
            </div>
        </div>
        <a href="hearyong.html" style="display:block; margin-top:40px; color:#555; text-decoration:none;">← BACK TO LIST</a>
    </div>
</div>

<footer>
    <p>&copy; 2026 SYRTN Collaboration. All Rights Reserved.</p>
    <p>영광해룡고등학교 | 순천고등학교 | 순천복성고등학교 물리·천문·지구과학 동아리 연합</p>
    <p>designed by SYRTN Team | 문의 : 2jw5464@gmail.com</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
        getFirestore, doc, getDoc, updateDoc, deleteDoc, 
        collection, addDoc, query, orderBy, onSnapshot, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 1. Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyB-0z16OPjp1wY0-U_EHKY9kbRCVba4DkU",
        authDomain: "syrt-2026.firebaseapp.com",
        projectId: "syrt-2026",
        storageBucket: "syrt-2026.firebasestorage.app",
        messagingSenderId: "848896876364",
        appId: "1:848896876364:web:42edc690489962f76df9e9"
    };

    const app = initializeApp(firebaseConfig);

    // 2. App Check 초기화
    const appCheck = initializeAppCheck(app, {
        provider: new ReCaptchaV3Provider('6Lfnw9ksAAAAAAoBVTPO6fqtCUMeteYlsk5OYjnq'),
        isTokenAutoRefreshEnabled: true 
    });

    const auth = getAuth(app);
    const db = getFirestore(app);

    // 전역 변수
    const ADMIN_EMAIL = "2jw5464@gmail.com";
    const postId = new URLSearchParams(window.location.search).get("id");
    let currentUser = null;
    let currentUserRole = "member";
    let postData = null;

    /**
     * 3. 인증 상태 감시 및 상단 바 UI 업데이트
     */
    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        const form = document.getElementById("commentFormArea");
        const notice = document.getElementById("loginNotice");
        const loginBtn = document.getElementById("loginBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const userNameDisplay = document.getElementById("userNameDisplay");
        
        if (user) {
            loginBtn.classList.add("hidden");
            logoutBtn.classList.remove("hidden");
            userNameDisplay.classList.remove("hidden");

            try {
                // Firestore에서 사용자 실명 및 역할 정보 가져오기
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    userNameDisplay.innerText = `${userData.name || user.displayName || '회원'}님`;
                    currentUserRole = userData.role || "member";
                } else {
                    userNameDisplay.innerText = `${user.displayName || '회원'}님`;
                }
            } catch (e) { 
                console.error("유저 정보 로드 에러:", e);
                userNameDisplay.innerText = `${user.displayName || '사용자'}님`; 
            }

            if (form) form.classList.remove("hidden");
            if (notice) notice.classList.add("hidden");
        } else {
            loginBtn.classList.remove("hidden");
            logoutBtn.classList.add("hidden");
            userNameDisplay.classList.add("hidden");
            userNameDisplay.innerText = "";
            currentUserRole = "member";

            if (form) form.classList.add("hidden");
            if (notice) notice.classList.remove("hidden");
        }
        
        if (postId) {
            loadPost();
            loadComments();
        } else {
            location.href = "block.html";
        }
    });

    /**
     * 4. 게시글 로드
     */
    async function loadPost() {
        const docRef = doc(db, "h-resources", postId);
        onSnapshot(docRef, (snap) => {
            if (!snap.exists()) {
                alert("삭제된 게시글입니다.");
                location.href = "hearyong.html";
                return;
            }
            postData = snap.data();
            
            document.getElementById("viewTitle").innerText = postData.title;
            document.getElementById("viewAuthor").innerText = `BY. ${postData.author}`;
            document.getElementById("viewDate").innerText = postData.createdAt?.toDate().toLocaleString() || "-";
            document.getElementById("viewContent").innerText = postData.description;

            const linksDiv = document.getElementById("linksContainer");
            linksDiv.innerHTML = "";
            if (postData.links && postData.links.length > 0) {
                postData.links.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.target = "_blank";
                    a.className = "link-item";
                    a.innerHTML = `<span class="link-name">${link.name}</span><span style="font-size:12px; opacity:0.6;">새창에서 열기 ↗</span>`;
                    linksDiv.appendChild(a);
                });
            }

            // 관리 권한 체크 (수정/삭제 버튼 노출)
            if (currentUser) {
                const isOwner = currentUser.uid === postData.uid;
                const isManager = (currentUserRole === 'admin' || currentUserRole === 'teacher' || currentUserRole === 'h-leader' || currentUser.email === ADMIN_EMAIL);
                if (isOwner) document.getElementById("btnEditPost").classList.remove("hidden");
                if (isOwner || isManager) document.getElementById("btnDeletePost").classList.remove("hidden");
            }
        });
    }

    /**
     * 5. 댓글 목록 로드
     */
    function loadComments() {
        const q = query(collection(db, "h-resources", postId, "comments"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById("commentList");
            if(!list) return;
            list.innerHTML = "";
            
            snap.forEach(commentDoc => {
                const c = commentDoc.data();
                const cid = commentDoc.id;

                const isCommentOwner = currentUser && currentUser.uid === c.uid;
                const isPostOwner = currentUser && currentUser.uid === postData?.uid;
                const isManager = (currentUserRole === 'admin' || currentUserRole === 'teacher' || currentUserRole === 'h-leader' || (currentUser && currentUser.email === ADMIN_EMAIL));
                
                const myHighlight = isCommentOwner ? "border: 1px solid var(--accent);" : "";

                list.innerHTML += `
                    <div class="comment-item" style="${myHighlight}">
                        <div class="comment-meta">
                            <span class="comment-author">${c.author}</span>
                            <div class="comment-actions">
                                <span>${c.createdAt?.toDate().toLocaleString() || "작성 중..."}</span>
                            </div>
                        </div>
                        <div class="comment-text">${c.content}</div>
                        <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:10px;">
                            ${isCommentOwner ? `<button class="btn-small" onclick="editComment('${cid}', \`${c.content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">수정</button>` : ""}
                            ${(isCommentOwner || isPostOwner || isManager) ? `<button class="btn-small" style="color:#ff4d4d; border-color:#ff4d4d;" onclick="deleteComment('${cid}')">삭제</button>` : ""}
                        </div>
                    </div>`;
            });
        });
    }

    /**
     * 6. 댓글 작성 및 이메일 알림 (GAS 연동)
     */
    document.getElementById("btnPostComment").onclick = async () => {
        const input = document.getElementById("commentInput");
        const content = input.value.trim();
        if (!content || !currentUser) return;

        const btn = document.getElementById("btnPostComment");
        btn.disabled = true;
        btn.innerText = "SENDING...";

        try {
            const userDoc = await getDoc(doc(db, "users", currentUser.uid));
            const authorName = userDoc.exists() ? userDoc.data().name : (currentUser.displayName || "익명");

            // Firestore 저장
            await addDoc(collection(db, "h-resources", postId, "comments"), {
                author: authorName,
                content: content,
                uid: currentUser.uid,
                createdAt: serverTimestamp()
            });

            // GAS 알림 발송 (비동기)
            if (postData && postData.authorEmail) {
                const GAS_URL = "https://script.google.com/macros/s/AKfycbxwDx5UzcTNUg-Er_AkUN2oA8-5s0zxyLYGz4MOsJUKoVzRThoEhAsO0zNDalZ5nkxi/exec";
                fetch(GAS_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" }, 
                    body: JSON.stringify({
                        postTitle: postData.title,
                        commentAuthor: authorName,
                        commentContent: content,
                        postAuthorEmail: postData.authorEmail,
                        postId: postId
                    })
                }).catch(e => console.error("GAS 알림 실패:", e));
            }

            input.value = "";
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);

        } catch (err) {
            console.error(err);
            alert("댓글 저장 중 오류가 발생했습니다.");
        } finally {
            btn.disabled = false;
            btn.innerText = "POST";
        }
    };

    /**
     * 7. 수정/삭제/로그아웃 관련 함수들
     */
    window.editComment = async (cid, oldContent) => {
        const newContent = prompt("댓글 수정:", oldContent);
        if (newContent && newContent !== oldContent) {
            try {
                await updateDoc(doc(db, "h-resources", postId, "comments", cid), {
                    content: newContent,
                    updatedAt: serverTimestamp()
                });
            } catch (err) { alert("수정 실패: " + err.message); }
        }
    };

    window.deleteComment = async (cid) => {
        if (confirm("댓글을 삭제하시겠습니까?")) {
            try {
                await deleteDoc(doc(db, "h-resources", postId, "comments", cid));
            } catch (err) { alert("삭제 실패: " + err.message); }
        }
    };

    document.getElementById("btnDeletePost").onclick = async () => {
        if (confirm("게시글을 영구 삭제하시겠습니까?")) {
            try {
                await deleteDoc(doc(db, "h-resources", postId));
                location.href = "hearyong.html";
            } catch (err) { alert("삭제 실패: " + err.message); }
        }
    };

    document.getElementById("btnEditPost").onclick = () => {
        location.href = `h-write.html?id=${postId}`;
    };

    document.getElementById("logoutBtn").onclick = async () => {
        if(confirm("로그아웃 하시겠습니까?")) {
            await signOut(auth);
            location.reload();
        }
    };
</script>
</body>
</html>
