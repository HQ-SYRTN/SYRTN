<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="SYRTN-logo-homepage.png" type="image/png">
    <link rel="apple-touch-icon" href="SYRTN-logo-homepage.png">
    <title>SYRTN | Access Denied</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --accent: #FF5252; 
            --sub-accent: #00E5FF;
            --text-main: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --nav-bg: rgba(0, 0, 0, 0.8);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- ?곷떒 Bar (Introduction怨??꾩쟾 ?숈씪) --- */
        .auth-bar {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: var(--nav-bg); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; box-sizing: border-box;
            z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-link {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; color: white; font-weight: 700; letter-spacing: 2px;
        }

        .nav-logo { height: 40px; width: 40px; border-radius: 50%; background-color: white; object-fit: contain; }

        .auth-user-zone { display: flex; align-items: center; gap: 15px; }

        .auth-btn {
            background: transparent; border: 1px solid var(--text-main);
            color: var(--text-main); padding: 6px 15px; cursor: pointer;
            text-decoration: none; font-size: 0.85rem; transition: 0.3s; border-radius: 4px;
        }

        .auth-btn:hover { background: var(--text-main); color: black; }

        #user-name { color: #ffffff !important; }

        /* --- 以묒븰 寃쎄퀬 ?뱀뀡 --- */
        .error-hero {
            flex: 1;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?q=80&w=2013') no-repeat center/cover;
            text-align: center; padding-top: 60px;
        }

        .error-card {
            background: var(--card-bg); backdrop-filter: blur(20px);
            padding: 60px 40px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 550px; width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-card h1 { font-size: 2.2rem; color: var(--accent); margin-bottom: 20px; font-weight: 700; }
        .error-card p { font-size: 1.1rem; color: rgba(255,255,255,0.8); margin-bottom: 40px; line-height: 1.7; word-break: keep-all; }

        /* --- 踰꾪듉 洹몃９ --- */
        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }

        .action-btn {
            padding: 12px 25px; cursor: pointer; text-decoration: none;
            font-size: 0.95rem; font-weight: 700; transition: 0.3s;
            border-radius: 4px; min-width: 160px; text-align: center;
        }

        .btn-secondary { background: transparent; border: 1px solid var(--text-main); color: var(--text-main); }
        .btn-secondary:hover { background: var(--text-main); color: black; }

        .btn-primary { background: transparent; border: 1px solid var(--sub-accent); color: var(--sub-accent); }
        .btn-primary:hover { background: var(--sub-accent); color: black; box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }

        footer {
            background: #000; padding: 40px 20px; text-align: center;
            font-size: 0.85rem; color: #444; border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 600px) {
            .logo-area span { font-size: 16px; }
            nav a { padding: 10px 12px; font-size: 13px; }
            header h1 { font-size: 22px; }
            .header-logo { width: 100px; height: 100px; }
        }
    
        /* Unified responsive navigation */
        .auth-bar {
            height: 60px !important;
            padding: 0 clamp(16px, 4vw, 40px) !important;
            gap: 16px !important;
        }
        .logo-link {
            min-width: 0 !important;
            flex: 0 1 auto !important;
            letter-spacing: 1.2px !important;
            white-space: nowrap !important;
        }
        .nav-logo {
            width: 40px !important;
            height: 40px !important;
            flex: 0 0 40px !important;
        }
        .auth-user-zone {
            min-width: 0 !important;
            flex: 0 1 auto !important;
            justify-content: flex-end !important;
            gap: 10px !important;
        }
        .auth-btn {
            min-height: 32px !important;
            padding: 6px 14px !important;
            box-sizing: border-box !important;
            white-space: nowrap !important;
            line-height: 1.2 !important;
        }
        .sub-nav-container {
            height: 52px !important;
            top: 60px !important;
            overflow-x: auto !important;
            overflow-y: hidden !important;
            -webkit-overflow-scrolling: touch !important;
            scrollbar-width: thin !important;
        }
        .nav-menu {
            min-height: 52px !important;
            width: max-content !important;
            min-width: 100% !important;
            display: flex !important;
            flex-wrap: nowrap !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 0 !important;
            padding: 0 16px !important;
            box-sizing: border-box !important;
        }
        .nav-menu a {
            height: 52px !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 0 14px !important;
            box-sizing: border-box !important;
            font-size: 0.9rem !important;
            line-height: 1.1 !important;
            letter-spacing: 0.8px !important;
            white-space: nowrap !important;
            flex: 0 0 auto !important;
        }
        .nav-menu a.active::after {
            bottom: 8px !important;
        }
        @media (max-width: 700px) {
            .auth-bar {
                height: 56px !important;
                padding: 0 14px !important;
            }
            .logo-link span {
                font-size: 0.95rem !important;
            }
            .nav-logo {
                width: 34px !important;
                height: 34px !important;
                flex-basis: 34px !important;
            }
            .auth-user-zone {
                gap: 8px !important;
            }
            .auth-user-zone span[id*="user"], #user-name, #userNameDisplay {
                max-width: 34vw !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
                white-space: nowrap !important;
            }
            .auth-btn {
                min-height: 30px !important;
                padding: 5px 10px !important;
                font-size: 0.78rem !important;
            }
            .sub-nav-container {
                top: 56px !important;
                height: 48px !important;
            }
            .nav-menu {
                min-height: 48px !important;
                justify-content: flex-start !important;
                padding: 0 10px !important;
            }
            .nav-menu a {
                height: 48px !important;
                padding: 0 11px !important;
                font-size: 0.78rem !important;
                letter-spacing: 0.4px !important;
            }
            header.intro-hero,
            header.board-hero {
                min-height: 260px !important;
                height: 38vh !important;
                padding-top: 56px !important;
            }
            .intro-hero h1,
            .board-hero h1,
            header h1 {
                font-size: clamp(2rem, 10vw, 2.6rem) !important;
                line-height: 1.12 !important;
                padding: 0 16px !important;
                box-sizing: border-box !important;
            }
            .intro-hero p,
            .board-hero p {
                font-size: 0.95rem !important;
                padding: 0 18px !important;
                box-sizing: border-box !important;
            }
            .content-section,
            .container {
                width: 100% !important;
                max-width: 100% !important;
                padding-left: 16px !important;
                padding-right: 16px !important;
                box-sizing: border-box !important;
            }
        }
    </style>
</head>
<body>

<div class="auth-bar">
    <a href="index.html" class="logo-link">
        <img src="SYRTN-logo-homepage.png" alt="SYRTN Logo" class="nav-logo">
        <span>SYRTN</span>
    </a>

    <div class="auth-user-zone">
        <a href="login.html" id="login-link" class="auth-btn">LOGIN</a>
        <span id="user-name" style="display:none; font-size: 0.9rem; margin-right: 10px;"></span>
        <button id="logout-btn" class="auth-btn" style="display:none;">LOGOUT</button>
    </div>
</div>

<main class="error-hero">
    <div class="error-card">
        <div style="font-size: 4rem; margin-bottom: 10px;">!</div>
        <h1>접근 권한이 없습니다</h1>
        <p>현재 계정으로는 이 페이지를 열 수 없습니다.<br>등급 조정을 통해 필요한 권한을 받은 뒤 다시 시도해주세요.</p>
        
        <div class="btn-group">
            <a href="index.html" class="action-btn btn-secondary">메인으로 돌아가기</a>
            <a href="login.html" class="action-btn btn-secondary">로그인하러 가기</a>
            <a href="adjust.html" class="action-btn btn-primary">등급 조정 요청하기</a>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 SYRTN Collaboration. All Rights Reserved.</p>
    <p>영광해룡고등학교 | 순천고등학교 | 순천복성고등학교 물리·천문·지구과학 동아리 연합</p>
    <p>designed by SYRTN Team | 문의 : 2jw5464@gmail.com</p>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB-0z16OPjp1wY0-U_EHKY9kbRCVba4DkU",
        authDomain: "syrt-2026.firebaseapp.com",
        projectId: "syrt-2026",
        storageBucket: "syrt-2026.firebasestorage.app",
        messagingSenderId: "848896876364",
        appId: "1:848896876364:web:42edc690489962f76df9e9",
        measurementId: "G-Q0BKR95VH2"
    };

    // Firebase ??珥덇린??
    const app = initializeApp(firebaseConfig);

    // --- [App Check 珥덇린?? ---
    const appCheck = initializeAppCheck(app, {
        provider: new ReCaptchaV3Provider('6Lfnw9ksAAAAAAoBVTPO6fqtCUMeteYlsk5OYjnq'),
        isTokenAutoRefreshEnabled: true
    });

    const auth = getAuth(app);
    const db = getFirestore(app);
    const loginLink = document.getElementById('login-link');
    const logoutBtn = document.getElementById('logout-btn');
    const userName = document.getElementById('user-name');

    // 濡쒓렇???곹깭 媛먯? 濡쒖쭅
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            if(loginLink) loginLink.style.display = 'none';
            if(userName) userName.style.display = 'inline';
            if(logoutBtn) logoutBtn.style.display = 'inline';

            try {
                const userDocRef = doc(db, "users", user.uid);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists()) {
                    const userData = userDocSnap.data();
                    userName.innerText = `${userData.name || user.displayName}님`;
                } else {
                    userName.innerText = `${user.displayName}님`;
                }
            } catch (error) {
                console.error("Firestore ?뺣낫 濡쒕뱶 ?ㅽ뙣:", error);
                userName.innerText = `${user.displayName}님`;
            }

        } else {
            if(loginLink) loginLink.style.display = 'inline';
            if(userName) userName.style.display = 'none';
            if(logoutBtn) logoutBtn.style.display = 'none';
        }
    });

    // 濡쒓렇?꾩썐 湲곕뒫
    logoutBtn.onclick = async () => {
        if (confirm("로그아웃 하시겠습니까?")) {
            try {
                await signOut(auth);
                alert("로그아웃 되었습니다.");
                location.href = 'index.html';
            } catch (err) {
                console.error("Logout Error:", err);
                alert("濡쒓렇?꾩썐 泥섎━ 以??ㅻ쪟媛 諛쒖깮?덉뒿?덈떎.");
            }
        }
    };
</script>
</body>
</html>
